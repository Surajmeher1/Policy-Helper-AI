<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password — Policy Helper AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Literata:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
  :root {
    --bg: #212121;
    --bg-2: #2f2f2f;
    --bg-3: #3a3a3a;
    --border: #404040;
    --border-subtle: #2e2e2e;
    --text: #ececec;
    --text-muted: #9b9b9b;
    --text-dim: #5f5f5f;
    --gold: #c9a84c;
    --gold-soft: rgba(201,168,76,0.1);
    --gold-border: rgba(201,168,76,0.25);
    --gold-glow: rgba(201,168,76,0.15);
    --danger: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14.5px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Full-page background with blurred image */
  body {
    background-image: url('{{ url_for("static", filename="picture1.jpg") }}');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    position: relative;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(18, 18, 18, 0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 0;
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px 28px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55);
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo / brand at top */
  .brand-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .logo {
    width: 38px; height: 38px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Literata', Georgia, serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--gold);
    flex-shrink: 0;
  }

  .brand-text .brand-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .brand-text .brand-sub {
    font-size: 11.5px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* Heading */
  .card-heading {
    text-align: center;
    margin-bottom: 26px;
  }

  .card-heading h2 {
    font-family: 'Literata', Georgia, serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .card-heading p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 5px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border-subtle);
    margin-bottom: 24px;
  }

  /* Form */
  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .input-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 15px;
    pointer-events: none;
  }

  .input-wrap .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .input-wrap .toggle-pw:hover { color: var(--text-muted); }

  .form-control {
    width: 100%;
    padding: 10px 40px 10px 38px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--gold);
  }

  .form-control::placeholder { color: var(--text-dim); }

  .form-control:focus {
    border-color: var(--gold-border);
    box-shadow: 0 0 0 3px var(--gold-glow);
    background: var(--bg-2);
  }

  /* Password strength bar */
  .strength-bar-wrap {
    margin-top: 8px;
    height: 4px;
    background: var(--border-subtle);
    border-radius: 4px;
    overflow: hidden;
  }

  .strength-bar {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.3s ease, background 0.3s ease;
  }

  .strength-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 22px;
    background: var(--gold);
    border: none;
    border-radius: var(--radius-sm);
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
    margin-top: 6px;
  }

  .submit-btn:hover {
    background: #d4af37;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(201,168,76,0.35);
  }

  .submit-btn:active { transform: translateY(0); }

  /* Footer link */
  .card-footer-text {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-dim);
    border-top: 1px solid var(--border-subtle);
    padding-top: 18px;
  }

  .card-footer-text a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.15s;
  }

  .card-footer-text a:hover { color: #d4af37; }

  /* Alert / error message */
  .alert {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius-xs);
    font-size: 13px;
    margin-bottom: 18px;
  }

  .alert-danger {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: #f87171;
  }

  /* Match indicator */
  .match-hint {
    font-size: 11px;
    margin-top: 5px;
    display: none;
  }

  .match-hint.ok  { color: #34d399; display: block; }
  .match-hint.err { color: #f87171; display: block; }

  /* Responsive */
  @media (max-width: 480px) {
    .card { padding: 28px 20px 22px; margin: 16px; }
  }
  </style>
</head>

<body>
  <div class="overlay"></div>

  <div class="card">

    <!-- Brand -->
    <div class="brand-row">
      <div class="logo">PS</div>
      <div class="brand-text">
        <div class="brand-name">Policy Helper AI</div>
        <div class="brand-sub">Secure Account</div>
      </div>
    </div>

    <!-- Heading -->
    <div class="card-heading">
      <h2>Reset Password</h2>
      <p>Choose a new password for your account.</p>
    </div>

    <div class="divider"></div>

    <!-- Optional flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-danger">
          <i class="bi bi-exclamation-circle"></i> {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" action="" id="resetForm">

      <div class="form-group">
        <label for="password" class="form-label">New Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter new password" required autocomplete="new-password">
          <button type="button" class="toggle-pw" data-target="password" aria-label="Toggle visibility">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div class="strength-bar-wrap">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-label" id="strengthLabel">Password strength</div>
      </div>

      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill input-icon"></i>
          <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                 placeholder="Re-enter new password" required autocomplete="new-password">
          <button type="button" class="toggle-pw" data-target="confirm_password" aria-label="Toggle visibility">
            <i class="bi bi-eye"></i>
          </button>
        </div>
        <div class="match-hint" id="matchHint"></div>
      </div>

      <button type="submit" class="submit-btn">
        <i class="bi bi-shield-lock-fill"></i> Reset Password
      </button>
    </form>

    <div class="card-footer-text">
      Remembered your password? <a href="/login">Login here</a>
    </div>

  </div>

  <script>
    /* ── Password visibility toggles ── */
    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const icon  = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'bi bi-eye-slash';
        } else {
          input.type = 'password';
          icon.className = 'bi bi-eye';
        }
      });
    });

    /* ── Password strength meter ── */
    const pwInput     = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLbl = document.getElementById('strengthLabel');

    function getStrength(pw) {
      let score = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    const levels = [
      { pct: '0%',   bg: 'transparent', label: 'Password strength' },
      { pct: '20%',  bg: '#f87171',     label: 'Very weak' },
      { pct: '40%',  bg: '#fb923c',     label: 'Weak' },
      { pct: '60%',  bg: '#facc15',     label: 'Fair' },
      { pct: '80%',  bg: '#34d399',     label: 'Strong' },
      { pct: '100%', bg: '#c9a84c',     label: 'Very strong' },
    ];

    pwInput.addEventListener('input', () => {
      const score = pwInput.value ? getStrength(pwInput.value) : 0;
      const lvl   = levels[score];
      strengthBar.style.width      = lvl.pct;
      strengthBar.style.background = lvl.bg;
      strengthLbl.textContent      = lvl.label;
      checkMatch();
    });

    /* ── Password match indicator ── */
    const confirmInput = document.getElementById('confirm_password');
    const matchHint    = document.getElementById('matchHint');

    function checkMatch() {
      if (!confirmInput.value) { matchHint.className = 'match-hint'; return; }
      if (pwInput.value === confirmInput.value) {
        matchHint.className   = 'match-hint ok';
        matchHint.innerHTML   = '<i class="bi bi-check-circle"></i> Passwords match';
      } else {
        matchHint.className   = 'match-hint err';
        matchHint.innerHTML   = '<i class="bi bi-x-circle"></i> Passwords do not match';
      }
    }

    confirmInput.addEventListener('input', checkMatch);

    /* ── Prevent submit if passwords don't match ── */
    document.getElementById('resetForm').addEventListener('submit', e => {
      if (pwInput.value !== confirmInput.value) {
        e.preventDefault();
        matchHint.className = 'match-hint err';
        matchHint.innerHTML = '<i class="bi bi-x-circle"></i> Passwords do not match';
        confirmInput.focus();
      }
    });
  </script>
</body>
</html>
