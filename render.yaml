services:
  - type: web
    name: policy-helper-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:${PORT:-5000} app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GROQ_API_KEY
        sync: false  # Set this in Render dashboard for security
      - key: SECRET_KEY
        sync: false
      - key: DB_TYPE
        value: sqlite
